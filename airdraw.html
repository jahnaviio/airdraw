<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hand Tracker Drawing App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b1a; /* Dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Stack canvases on top of each other */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        #drawingCanvas {
            z-index: 1;
        }
        
        #overlayCanvas {
            z-index: 2;
        }

        #video {
            display: none; /* Hide the raw webcam feed */
        }

        /* UI Panel Styling */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(15, 15, 25, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        #status {
            font-weight: bold;
            margin-top: 20px;
            font-size: 16px;
            text-shadow: 0 0 5px currentColor;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="control-group">
            <label for="colorPicker">Neon Color</label>
            <input type="color" id="colorPicker" value="#00ffff">
        </div>
        <div class="control-group">
            <label for="brushSize">Brush Thickness</label>
            <input type="range" id="brushSize" min="2" max="30" value="8">
        </div>
        <div id="status" style="color: #ffff00;">Status: Loading Camera...</div>
        
        <div style="margin-top: 15px; font-size: 12px; color: #888;">
            <strong>Gestures:</strong><br>
            ☝️ Index Finger = Draw<br>
            🖐️ Open Palm = Erase<br>
            ✊ Closed Fist = Pause
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="drawingCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>

    <script>
        // DOM Elements
        const videoElement = document.getElementById('video');
        const drawingCanvas = document.getElementById('drawingCanvas');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const drawingCtx = drawingCanvas.getContext('2d');
        const overlayCtx = overlayCanvas.getContext('2d');
        
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const statusText = document.getElementById('status');

        // Resize canvases to fill the screen
        function resizeCanvases() {
            drawingCanvas.width = window.innerWidth;
            drawingCanvas.height = window.innerHeight;
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // Drawing State
        let lastX = null;
        let lastY = null;

        // Process Hand Tracking Results
        function onResults(results) {
            // Clear the overlay canvas every frame for the floating cursor
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Simple Gesture Heuristics (y goes down, so smaller y is higher up)
                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isMiddleUp = landmarks[12].y < landmarks[10].y;
                const isRingUp = landmarks[16].y < landmarks[14].y;
                const isPinkyUp = landmarks[20].y < landmarks[18].y;

                let mode = 'pause';
                if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
                    mode = 'draw';
                } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                    mode = 'erase';
                } else if (!isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
                    mode = 'pause';
                }

                // Map Index Finger coordinates to screen (mirroring the X axis so it feels like a mirror)
                const x = (1 - landmarks[8].x) * drawingCanvas.width;
                const y = landmarks[8].y * drawingCanvas.height;

                // Handle Drawing Logic
                if (mode === 'draw') {
                    statusText.innerText = "DRAWING";
                    statusText.style.color = colorPicker.value;

                    drawingCtx.beginPath();
                    drawingCtx.lineCap = "round";
                    drawingCtx.lineJoin = "round";
                    drawingCtx.lineWidth = brushSize.value;
                    
                    // Neon Glow Effect
                    drawingCtx.strokeStyle = colorPicker.value;
                    drawingCtx.shadowBlur = 15;
                    drawingCtx.shadowColor = colorPicker.value;
                    drawingCtx.globalCompositeOperation = 'source-over';

                    if (lastX !== null && lastY !== null) {
                        drawingCtx.moveTo(lastX, lastY);
                        drawingCtx.lineTo(x, y);
                        drawingCtx.stroke();
                    }
                    lastX = x;
                    lastY = y;

                } else if (mode === 'erase') {
                    statusText.innerText = "ERASING";
                    statusText.style.color = "#ff4444";

                    // Eraser Effect (removes pixels)
                    drawingCtx.beginPath();
                    drawingCtx.shadowBlur = 0; // Turn off glow for eraser
                    drawingCtx.globalCompositeOperation = 'destination-out';
                    drawingCtx.arc(x, y, brushSize.value * 3, 0, Math.PI * 2);
                    drawingCtx.fill();

                    lastX = null;
                    lastY = null;

                } else {
                    statusText.innerText = "PAUSED (Fist)";
                    statusText.style.color = "#aaaaaa";
                    lastX = null;
                    lastY = null;
                }

                // Draw live cursor on the overlay canvas
                overlayCtx.beginPath();
                overlayCtx.arc(x, y, parseInt(brushSize.value) / 2 + 2, 0, Math.PI * 2);
                overlayCtx.fillStyle = mode === 'erase' ? 'rgba(255, 0, 0, 0.5)' : '#ffffff';
                overlayCtx.fill();
                if (mode === 'draw') {
                    overlayCtx.shadowBlur = 10;
                    overlayCtx.shadowColor = colorPicker.value;
                }

            } else {
                lastX = null;
                lastY = null;
                statusText.innerText = "No Hand Detected";
                statusText.style.color = "#ffffff";
            }
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1, // Track one hand to avoid cross-drawing
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        
        hands.onResults(onResults);

        // Initialize WebCam
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            statusText.innerText = "Camera Active. Show Hand!";
        }).catch(err => {
            statusText.innerText = "Camera Access Denied!";
            statusText.style.color = "#ff0000";
            console.error(err);
        });
    </script>
</body>
</html>
