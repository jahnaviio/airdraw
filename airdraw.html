<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaPipe Neon Air Drawing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

#container{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:1;
    background:#000;
}

#drawCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:2;
    pointer-events:none;
}

#landmarkCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:3;
    pointer-events:none;
}

.controls{
    position:fixed;
    top:15px;
    left:15px;
    z-index:100;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    padding:12px;
    border-radius:16px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    color:white;
}

label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
}

input[type="color"]{
    width:45px;
    height:40px;
    border:none;
    background:none;
    cursor:pointer;
}

.status{
    position:fixed;
    top:15px;
    right:15px;
    z-index:100;
    padding:12px 18px;
    border-radius:14px;
    background:rgba(0,0,0,0.5);
    color:#fff;
    font-weight:bold;
    backdrop-filter:blur(10px);
}

.clearBtn{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="container">
    <!-- IMPORTANT: CAMERA IS BACKGROUND -->
    <video id="video" autoplay playsinline muted></video>

    <!-- TRANSPARENT DRAWING LAYER -->
    <canvas id="drawCanvas"></canvas>

    <!-- HAND LANDMARKS -->
    <canvas id="landmarkCanvas"></canvas>
</div>

<div class="controls">
    <label>
        Color
        <input type="color" id="colorPicker" value="#00ffff">
    </label>

    <label>
        Size
        <input type="range" id="brushSize" min="2" max="30" value="8">
    </label>

    <button class="clearBtn" id="clearBtn">
        Clear
    </button>
</div>

<div class="status" id="status">
    Waiting...
</div>

<script type="module">

import {
    HandLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");

const drawCanvas = document.getElementById("drawCanvas");
const drawCtx = drawCanvas.getContext("2d");

const landmarkCanvas = document.getElementById("landmarkCanvas");
const landmarkCtx = landmarkCanvas.getContext("2d");

const statusEl = document.getElementById("status");

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");

let handLandmarker;
let drawing = false;
let lastPoint = null;

function resizeCanvases(){
    drawCanvas.width = window.innerWidth;
    drawCanvas.height = window.innerHeight;

    landmarkCanvas.width = window.innerWidth;
    landmarkCanvas.height = window.innerHeight;
}
resizeCanvases();
window.addEventListener("resize", resizeCanvases);

async function startCamera(){

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            width:{ideal:1280},
            height:{ideal:720},
            facingMode:"user"
        },
        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{
        video.onloadedmetadata=()=>{
            video.play();
            resolve();
        };
    });
}

async function loadMediaPipe(){

    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            runningMode:"VIDEO",
            numHands:1
        }
    );
}

function clearDrawing(){
    drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

document.getElementById("clearBtn").onclick = clearDrawing;

function distance(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function isFingerExtended(tip,pip){
    return tip.y < pip.y;
}

function detectGesture(hand){

    const indexExtended =
        isFingerExtended(hand[8], hand[6]);

    const middleExtended =
        isFingerExtended(hand[12], hand[10]);

    const ringExtended =
        isFingerExtended(hand[16], hand[14]);

    const pinkyExtended =
        isFingerExtended(hand[20], hand[18]);

    const count =
        Number(indexExtended)+
        Number(middleExtended)+
        Number(ringExtended)+
        Number(pinkyExtended);

    if(
        indexExtended &&
        !middleExtended &&
        !ringExtended &&
        !pinkyExtended
    ){
        return "DRAW";
    }

    if(count >= 4){
        return "CLEAR";
    }

    if(count === 0){
        return "PAUSE";
    }

    return "PAUSE";
}

function drawNeonLine(x1,y1,x2,y2){

    const color = colorPicker.value;
    const size = Number(brushSize.value);

    drawCtx.lineCap="round";
    drawCtx.lineJoin="round";

    drawCtx.shadowBlur=size*3;
    drawCtx.shadowColor=color;

    drawCtx.strokeStyle=color;
    drawCtx.lineWidth=size;

    drawCtx.beginPath();
    drawCtx.moveTo(x1,y1);
    drawCtx.lineTo(x2,y2);
    drawCtx.stroke();

    drawCtx.shadowBlur=size*6;
    drawCtx.lineWidth=size/2;

    drawCtx.beginPath();
    drawCtx.moveTo(x1,y1);
    drawCtx.lineTo(x2,y2);
    drawCtx.stroke();
}

function drawLandmarks(hand){

    landmarkCtx.clearRect(
        0,
        0,
        landmarkCanvas.width,
        landmarkCanvas.height
    );

    landmarkCtx.fillStyle="#00ff88";

    for(const lm of hand){

        const x =
            (1-lm.x) *
            landmarkCanvas.width;

        const y =
            lm.y *
            landmarkCanvas.height;

        landmarkCtx.beginPath();
        landmarkCtx.arc(x,y,4,0,Math.PI*2);
        landmarkCtx.fill();
    }
}

let lastVideoTime = -1;

async function predict(){

    if(video.readyState < 2){
        requestAnimationFrame(predict);
        return;
    }

    if(video.currentTime !== lastVideoTime){

        lastVideoTime = video.currentTime;

        const result =
            handLandmarker.detectForVideo(
                video,
                performance.now()
            );

        landmarkCtx.clearRect(
            0,
            0,
            landmarkCanvas.width,
            landmarkCanvas.height
        );

        if(result.landmarks.length){

            const hand = result.landmarks[0];

            drawLandmarks(hand);

            const gesture =
                detectGesture(hand);

            if(gesture==="CLEAR"){

                statusEl.textContent =
                    "🧹 Clear";

                clearDrawing();
                drawing=false;
                lastPoint=null;
            }

            else if(gesture==="PAUSE"){

                statusEl.textContent =
                    "⏸ Paused";

                drawing=false;
                lastPoint=null;
            }

            else if(gesture==="DRAW"){

                statusEl.textContent =
                    "✏️ Drawing";

                drawing=true;

                const tip = hand[8];

                const x =
                    (1-tip.x) *
                    drawCanvas.width;

                const y =
                    tip.y *
                    drawCanvas.height;

                if(lastPoint){

                    drawNeonLine(
                        lastPoint.x,
                        lastPoint.y,
                        x,
                        y
                    );
                }

                lastPoint={x,y};
            }

        }else{

            statusEl.textContent =
                "No Hand";

            drawing=false;
            lastPoint=null;
        }
    }

    requestAnimationFrame(predict);
}

(async()=>{

    try{

        await startCamera();

        // CAMERA STAYS FULLSCREEN
        // DRAWING CANVAS IS TRANSPARENT

        await loadMediaPipe();

        predict();

    }catch(err){

        console.error(err);

        statusEl.textContent =
            "Camera Permission Required";
    }

})();
</script>

</body>
</html>
