<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaPipe Hand Drawing Camera</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
}

#container{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:1;
}

#drawCanvas,
#debugCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

#drawCanvas{
    z-index:3;
    background:transparent;
}

#debugCanvas{
    z-index:4;
}

.controls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:10;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:18px;
    padding:16px;
    color:white;
    min-width:220px;
}

.controls h3{
    margin-bottom:10px;
    font-size:16px;
}

.control-group{
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
}

input[type="color"]{
    width:100%;
    height:45px;
    border:none;
    border-radius:10px;
    background:none;
    cursor:pointer;
}

input[type="range"]{
    width:100%;
}

#status{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);

    color:#fff;
    font-size:18px;
    font-weight:bold;
    padding:14px 26px;
    border-radius:50px;
    letter-spacing:2px;
    border:1px solid rgba(255,255,255,0.2);
}

.status-drawing{
    color:#00ff88;
}

.status-paused{
    color:#ffd700;
}

.status-clearing{
    color:#ff5555;
}

@media(max-width:768px){
    .controls{
        left:10px;
        top:10px;
        min-width:190px;
        padding:12px;
    }
}
</style>
</head>
<body>

<div id="container">

    <!-- Webcam always visible -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Transparent drawing layer -->
    <canvas id="drawCanvas"></canvas>

    <!-- Landmark debugging layer -->
    <canvas id="debugCanvas"></canvas>

</div>

<div class="controls">
    <h3>🎨 Hand Drawing</h3>

    <div class="control-group">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#00ffff">
    </div>

    <div class="control-group">
        <label>Brush Size</label>
        <input type="range" id="brushSize" min="2" max="40" value="8">
    </div>
</div>

<div id="status" class="status-paused">
    PAUSED
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById("video");
const drawCanvas = document.getElementById("drawCanvas");
const debugCanvas = document.getElementById("debugCanvas");

const drawCtx = drawCanvas.getContext("2d");
const debugCtx = debugCanvas.getContext("2d");

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");
const statusEl = document.getElementById("status");

let currentColor = colorPicker.value;
let currentSize = parseInt(brushSize.value);

let lastPoint = null;
let currentHand = null;
let currentMode = "PAUSED";
let clearCooldown = false;

function resizeCanvas(){
    drawCanvas.width = window.innerWidth;
    drawCanvas.height = window.innerHeight;

    debugCanvas.width = window.innerWidth;
    debugCanvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

colorPicker.addEventListener("input", ()=>{
    currentColor = colorPicker.value;
});

brushSize.addEventListener("input", ()=>{
    currentSize = parseInt(brushSize.value);
});

function setStatus(mode){
    currentMode = mode;
    statusEl.textContent = mode;

    statusEl.className = "";

    if(mode==="DRAWING"){
        statusEl.classList.add("status-drawing");
    }else if(mode==="CLEARING"){
        statusEl.classList.add("status-clearing");
    }else{
        statusEl.classList.add("status-paused");
    }
}

function fingerExtended(tip,pip,landmarks){
    return landmarks[tip].y < landmarks[pip].y;
}

function detectGesture(landmarks){

    const indexUp = fingerExtended(8,6,landmarks);
    const middleUp = fingerExtended(12,10,landmarks);
    const ringUp = fingerExtended(16,14,landmarks);
    const pinkyUp = fingerExtended(20,18,landmarks);

    const total =
        (indexUp?1:0)+
        (middleUp?1:0)+
        (ringUp?1:0)+
        (pinkyUp?1:0);

    if(indexUp && total===1){
        return "DRAWING";
    }

    if(indexUp && middleUp && ringUp && pinkyUp){
        return "CLEARING";
    }

    return "PAUSED";
}

function clearDrawing(){
    drawCtx.clearRect(
        0,
        0,
        drawCanvas.width,
        drawCanvas.height
    );
}

function drawNeonLine(x1,y1,x2,y2){

    drawCtx.save();

    drawCtx.lineCap="round";
    drawCtx.lineJoin="round";

    drawCtx.strokeStyle=currentColor;
    drawCtx.lineWidth=currentSize;

    drawCtx.shadowColor=currentColor;
    drawCtx.shadowBlur=currentSize*2;

    drawCtx.beginPath();
    drawCtx.moveTo(x1,y1);
    drawCtx.lineTo(x2,y2);
    drawCtx.stroke();

    drawCtx.restore();
}

function render(){

    requestAnimationFrame(render);

    debugCtx.clearRect(
        0,
        0,
        debugCanvas.width,
        debugCanvas.height
    );

    if(!currentHand){
        lastPoint = null;
        return;
    }

    const landmarks = currentHand;
    const gesture = detectGesture(landmarks);

    setStatus(gesture);

    if(gesture==="CLEARING"){

        if(!clearCooldown){

            clearCooldown=true;
            clearDrawing();

            setStatus("CLEARING");

            setTimeout(()=>{
                clearCooldown=false;
            },800);
        }

        lastPoint=null;
    }

    const tip = landmarks[8];

    const x =
        (1-tip.x) *
        drawCanvas.width;

    const y =
        tip.y *
        drawCanvas.height;

    if(gesture==="DRAWING"){

        if(lastPoint){

            drawNeonLine(
                lastPoint.x,
                lastPoint.y,
                x,
                y
            );
        }

        lastPoint={x,y};

    }else{
        lastPoint=null;
    }

    drawConnectors(
        debugCtx,
        landmarks,
        HAND_CONNECTIONS,
        {
            color:"#00FF00",
            lineWidth:2
        }
    );

    drawLandmarks(
        debugCtx,
        landmarks,
        {
            color:"#FF0000",
            radius:4
        }
    );
}

const hands = new Hands({
    locateFile:(file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults((results)=>{

    if(
        results.multiHandLandmarks &&
        results.multiHandLandmarks.length
    ){
        currentHand =
            results.multiHandLandmarks[0];
    }else{
        currentHand=null;
    }
});

async function startCamera(){

    try{

        const stream =
            await navigator.mediaDevices.getUserMedia({
                video:{
                    facingMode:"user"
                },
                audio:false
            });

        video.srcObject=stream;

        await video.play();

        const camera = new Camera(
            video,
            {
                onFrame: async ()=>{
                    await hands.send({
                        image: video
                    });
                },
                width:1280,
                height:720
            }
        );

        camera.start();

    }catch(err){

        alert(
            "Camera access denied or unavailable."
        );

        console.error(err);
    }
}

startCamera();
render();
</script>

</body>
</html>
