<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaPipe Air Drawing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:0;
}

#drawCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

.controls{
    position:fixed;
    top:15px;
    left:15px;
    z-index:10;
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(8px);
}

.controls label{
    font-size:14px;
    color:#222;
}

input[type="range"]{
    width:120px;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="drawCanvas"></canvas>

<div class="controls">
    <label>
        Color
        <input type="color" id="colorPicker" value="#00ffff">
    </label>

    <label>
        Size
        <input type="range" id="brushSize" min="2" max="40" value="8">
    </label>
</div>

<script type="module">

import {
    HandLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");

let handLandmarker;
let running = true;

let prevX = null;
let prevY = null;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            width:{ideal:1280},
            height:{ideal:720}
        }
    });

    video.srcObject = stream;

    return new Promise(resolve=>{
        video.onloadedmetadata = ()=>{
            video.play();
            resolve();
        };
    });
}

async function loadHandTracking(){

    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            runningMode:"VIDEO",
            numHands:1
        }
    );
}

function distance(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function isFingerExtended(tip,pip){
    return tip.y < pip.y;
}

function detectGesture(landmarks){

    const thumbTip = landmarks[4];
    const thumbIp  = landmarks[3];

    const indexTip = landmarks[8];
    const indexPip = landmarks[6];

    const middleTip = landmarks[12];
    const middlePip = landmarks[10];

    const ringTip = landmarks[16];
    const ringPip = landmarks[14];

    const pinkyTip = landmarks[20];
    const pinkyPip = landmarks[18];

    const indexUp = isFingerExtended(indexTip,indexPip);
    const middleUp = isFingerExtended(middleTip,middlePip);
    const ringUp = isFingerExtended(ringTip,ringPip);
    const pinkyUp = isFingerExtended(pinkyTip,pinkyPip);

    const thumbOpen =
        distance(thumbTip,indexTip) > 0.10;

    // Open Palm -> Clear
    if(indexUp && middleUp && ringUp && pinkyUp && thumbOpen){
        return "erase";
    }

    // One Index Finger -> Draw
    if(indexUp && !middleUp && !ringUp && !pinkyUp){
        return "draw";
    }

    // Closed Fist -> Pause
    if(!indexUp && !middleUp && !ringUp && !pinkyUp){
        return "pause";
    }

    return "pause";
}

function drawNeon(x,y){

    const color = colorPicker.value;
    const size = Number(brushSize.value);

    if(prevX === null || prevY === null){
        prevX = x;
        prevY = y;
        return;
    }

    ctx.save();

    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.strokeStyle = color;
    ctx.lineWidth = size;

    ctx.shadowColor = color;
    ctx.shadowBlur = size * 2.5;

    ctx.beginPath();
    ctx.moveTo(prevX, prevY);
    ctx.lineTo(x, y);
    ctx.stroke();

    ctx.restore();

    prevX = x;
    prevY = y;
}

function clearDrawing(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

async function predict(){

    if(!running){
        requestAnimationFrame(predict);
        return;
    }

    if(video.readyState >= 2){

        const results = handLandmarker.detectForVideo(
            video,
            performance.now()
        );

        if(results.landmarks.length){

            const lm = results.landmarks[0];

            const gesture = detectGesture(lm);

            const tip = lm[8];

            const x = (1 - tip.x) * canvas.width;
            const y = tip.y * canvas.height;

            if(gesture === "draw"){

                drawNeon(x,y);

            }else if(gesture === "erase"){

                clearDrawing();
                prevX = null;
                prevY = null;

            }else{

                prevX = null;
                prevY = null;
            }

        }else{
            prevX = null;
            prevY = null;
        }
    }

    requestAnimationFrame(predict);
}

(async ()=>{

    await startCamera();
    await loadHandTracking();
    predict();

})();
</script>

</body>
</html>
